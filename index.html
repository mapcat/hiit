<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom HIIT Engine</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .timer-display {
            font-size: 5rem;
            font-weight: bold;
            margin: 20px 0;
            font-variant-numeric: tabular-nums;
        }
        .status-display {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #bb86fc;
            margin-bottom: 10px;
        }
        .exercise-name {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 30px;
            min-height: 2.4rem;
        }
        button {
            background-color: #03dac6;
            color: #000000;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s, background-color 0.2s;
        }
        button:active {
            transform: scale(0.98);
        }
        button.stop {
            background-color: #cf6679;
            color: #ffffff;
        }
        .setup-mode { display: block; }
        .run-mode { display: none; }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #a0a0a0;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            background-color: #1e1e1e;
            border: 1px solid #333333;
            border-radius: 8px;
            color: #ffffff;
            font-size: 1rem;
            box-sizing: border-box;
        }
        textarea { height: 120px; resize: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="setupView" class="setup-mode">
        <div class="input-group">
            <label for="workTime">Work Duration (seconds):</label>
            <input type="number" id="workTime" value="30" min="1">
        </div>
        <div class="input-group">
            <label for="restTime">Rest Duration (seconds):</label>
            <input type="number" id="restTime" value="15" min="1">
        </div>
        <div class="input-group">
            <label for="exerciseList">Exercises (one per line):</label>
            <textarea id="exerciseList">Jumping Jacks
Pushups
Squats
Plank</textarea>
        </div>
        <button id="startBtn">START WORKOUT</button>
    </div>

    <div id="runView" class="run-mode">
        <div id="statusLabel" class="status-display">Get Ready</div>
        <div id="exerciseLabel" class="exercise-name">---</div>
        <div id="timerLabel" class="timer-display">00</div>
        <button id="stopBtn" class="stop">STOP</button>
    </div>
</div>

<script>
    let exercises = [];
    let currentIdx = 0;
    let isWorkPhase = true;
    let timeLeft = 0;
    let timerInterval = null;

    const setupView = document.getElementById('setupView');
    const runView = document.getElementById('runView');
    const workInput = document.getElementById('workTime');
    const restInput = document.getElementById('restTime');
    const listInput = document.getElementById('exerciseList');
    
    const statusLabel = document.getElementById('statusLabel');
    const exerciseLabel = document.getElementById('exerciseLabel');
    const timerLabel = document.getElementById('timerLabel');
    
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');

    const synth = window.speechSynthesis;

    function speak(text) {
        if (synth.speaking) synth.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 1.15; // Slightly faster pacing for workout countdowns
        synth.speak(utterance);
    }

    function updateDisplay() {
        timerLabel.textContent = timeLeft;
        if (isWorkPhase) {
            statusLabel.textContent = "Work";
            statusLabel.style.color = "#03dac6";
            exerciseLabel.textContent = exercises[currentIdx];
        } else {
            statusLabel.textContent = "Rest";
            statusLabel.style.color = "#bb86fc";
            exerciseLabel.textContent = "Up Next: " + (exercises[currentIdx + 1] || "Done!");
        }
    }

    function tick() {
        if (timeLeft <= 0) {
            if (isWorkPhase) {
                isWorkPhase = false;
                timeLeft = parseInt(restInput.value);
                if (currentIdx >= exercises.length - 1) {
                    endWorkout();
                    return;
                }
                speak("Rest time!");
            } else {
                currentIdx++;
                isWorkPhase = true;
                timeLeft = parseInt(workInput.value);
                speak("Next exercise: " + exercises[currentIdx]);
            }
        } else {
            if (timeLeft === 4) speak("3");
            if (timeLeft === 3) speak("2");
            if (timeLeft === 2) speak("1");
            timeLeft--;
        }
        updateDisplay();
    }

    function startWorkout() {
        exercises = listInput.value.split('\n').map(e => e.trim()).filter(e => e.length > 0);
        if (exercises.length === 0) return alert("Please enter at least one exercise.");

        currentIdx = 0;
        isWorkPhase = true;
        timeLeft = parseInt(workInput.value);

        setupView.style.display = 'none';
        runView.style.display = 'block';

        speak("Workout started. First exercise: " + exercises[currentIdx]);
        updateDisplay();
        
        timerInterval = setInterval(tick, 1000);
    }

    function endWorkout() {
        clearInterval(timerInterval);
        speak("Workout complete! Great job.");
        setupView.style.display = 'block';
        runView.style.display = 'none';
    }

    function stopWorkout() {
        clearInterval(timerInterval);
        if (synth.speaking) synth.cancel();
        setupView.style.display = 'block';
        runView.style.display = 'none';
    }

    startBtn.addEventListener('click', startWorkout);
    stopBtn.addEventListener('click', stopWorkout);
</script>

</body>
</html>
