<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom HIIT Engine</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .timer-display {
            font-size: 5rem;
            font-weight: bold;
            margin: 20px 0;
            font-variant-numeric: tabular-nums;
        }
        .status-display {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #bb86fc;
            margin-bottom: 10px;
        }
        .exercise-name {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 30px;
            min-height: 2.4rem;
        }
        button {
            background-color: #03dac6;
            color: #000000;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s, background-color 0.2s;
        }
        button:active {
            transform: scale(0.98);
        }
        button.stop {
            background-color: #cf6679;
            color: #ffffff;
        }
        .setup-mode { display: block; }
        .run-mode { display: none; }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #a0a0a0;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            background-color: #1e1e1e;
            border: 1px solid #333333;
            border-radius: 8px;
            color: #ffffff;
            font-size: 1rem;
            box-sizing: border-box;
        }
        textarea { height: 120px; resize: none; }
    </style>
</head>
<body>

<div class="container">
    <!-- SETUP VIEW -->
    <div id="setupView" class="setup-mode">
        <div class="input-group">
            <label for="workTime">Work Duration (seconds):</label>
            <input type="number" id="workTime" value="30" min="5">
        </div>
        <div class="input-group">
            <label for="restTime">Rest Duration (seconds):</label>
            <input type="number" id="restTime" value="15" min="5">
        </div>
        <div class="input-group">
            <label for="exerciseList">Exercises (one per line):</label>
            <textarea id="exerciseList">Jumping Jacks
Pushups
Squats
Plank</textarea>
        </div>
        <button id="startBtn">START WORKOUT</button>
    </div>

    <!-- RUNNING VIEW -->
    <div id="runView" class="run-mode">
        <div id="statusLabel" class="status-display">Get Ready</div>
        <div id="exerciseLabel" class="exercise-name">---</div>
        <div id="timerLabel" class="timer-display">00</div>
        <button id="stopBtn" class="stop">STOP</button>
    </div>
</div>

<!-- Structural continuous audio loop to force background execution permissions -->
<audio id="bgAudio" loop playsinline></audio>

<script>
    let exercises = [];
    let currentIdx = 0;
    let isWorkPhase = true;
    let timeLeft = 0;
    let timerInterval = null;
    let expectedTime = null;

    const setupView = document.getElementById('setupView');
    const runView = document.getElementById('runView');
    const workInput = document.getElementById('workTime');
    const restInput = document.getElementById('restTime');
    const listInput = document.getElementById('exerciseList');
    
    const statusLabel = document.getElementById('statusLabel');
    const exerciseLabel = document.getElementById('exerciseLabel');
    const timerLabel = document.getElementById('timerLabel');
    
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const bgAudio = document.getElementById('bgAudio');

    const synth = window.speechSynthesis;

    // Generate a true, compliant 1-second silent audio data stream manually
    // This gives iOS a concrete media object to flag as "Playing" in the control center
    function initializeAudioTrack() {
        const sampleRate = 8000;
        const numSamples = sampleRate;
        const buf = new Uint8Array(44 + numSamples);
        
        // RIFF Header
        buf.set([82,73,70,70], 0); // RIFF
        buf[4] = (36 + numSamples) & 255; buf[5] = ((36 + numSamples) >> 8) & 255;
        buf.set([87,65,86,69,102,109,116,32,16,0,0,0,1,0,1,0], 8); // WAVEfmt 
        buf[24] = sampleRate & 255; buf[25] = (sampleRate >> 8) & 255; // Sample Rate
        buf[28] = sampleRate & 255; buf[29] = (sampleRate >> 8) & 255; // Byte Rate
        buf.set([1,0,8,0,100,97,116,97], 32); // BlockAlign, BitsPerSample, data
        buf[40] = numSamples & 255; buf[41] = (numSamples >> 8) & 255; // Data chunk size
        
        // Fill audio with blank sound midpoints (PCM 8-bit silence is 128)
        for (let i = 0; i < numSamples; i++) buf[44 + i] = 128;
        
        const blob = new Blob([buf], { type: 'audio/wav' });
        bgAudio.src = URL.createObjectURL(blob);
    }

    function speak(text) {
        if (synth.speaking) synth.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 1.15;
        synth.speak(utterance);
    }

    function updateDisplay() {
        timerLabel.textContent = timeLeft;
        if (isWorkPhase) {
            statusLabel.textContent = "Work";
            statusLabel.style.color = "#03dac6";
            exerciseLabel.textContent = exercises[currentIdx];
        } else {
            statusLabel.textContent = "Rest";
            statusLabel.style.color = "#bb86fc";
            exerciseLabel.textContent = "Up Next: " + (exercises[currentIdx + 1] || "Done!");
        }
    }

    // High-precision clock checking that calculates real drifted time elapsed
    // This allows the timer to catch up if iOS throttles it for a split second
    function engineStep() {
        const drift = Date.now() - expectedTime;
        if (drift > 5000) {
            // The phone was deeply asleep; pull current interval calculations back into alignment
            const missingSeconds = Math.floor(drift / 1000);
            timeLeft -= missingSeconds;
        }

        if (timeLeft <= 0) {
            if (isWorkPhase) {
                isWorkPhase = false;
                timeLeft = parseInt(restInput.value);
                if (currentIdx >= exercises.length - 1) {
                    endWorkout();
                    return;
                }
                speak("Rest time!");
            } else {
                currentIdx++;
                isWorkPhase = true;
                timeLeft = parseInt(workInput.value);
                speak("Next exercise: " + exercises[currentIdx]);
            }
        } else {
            if (timeLeft === 4) speak("3");
            if (timeLeft === 3) speak("2");
            if (timeLeft === 2) speak("1");
            timeLeft--;
        }
        
        updateDisplay();
        expectedTime += 1000;
        timerInterval = setTimeout(engineStep, Math.max(0, 1000 - drift));
    }

    function startWorkout() {
        exercises = listInput.value.split('\n').map(e => e.trim()).filter(e => e.length > 0);
        if (exercises.length === 0) return alert("Please enter at least one exercise.");

        currentIdx = 0;
        isWorkPhase = true;
        timeLeft = parseInt(workInput.value);

        setupView.style.display = 'none';
        runView.style.display = 'block';

        // Initialize and fire off the media tracking engine loop
        initializeAudioTrack();
        bgAudio.play().then(() => {
            speak("Workout started. First exercise: " + exercises[currentIdx]);
            updateDisplay();
            
            expectedTime = Date.now() + 1000;
            timerInterval = setTimeout(engineStep, 1000);
        }).catch(err => {
            alert("Please ensure your phone isn't on hardware silent switch and click Start again.");
        });
    }

    function endWorkout() {
        clearTimeout(timerInterval);
        bgAudio.pause();
        speak("Workout complete! Great job.");
        setupView.style.display = 'block';
        runView.style.display = 'none';
    }

    function stopWorkout() {
        clearTimeout(timerInterval);
        bgAudio.pause();
        if (synth.speaking) synth.cancel();
        setupView.style.display = 'block';
        runView.style.display = 'none';
    }

    startBtn.addEventListener('click', startWorkout);
    stopBtn.addEventListener('click', stopWorkout);
</script>

</body>
</html>
