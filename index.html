<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>My HIIT Timer</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #ffffff;
            --accent: #ff4757;
            --work: #2ed573;
            --rest: #1e90ff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 400px; }
        h1 { text-align: center; font-size: 24px; margin-bottom: 20px; }
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .timer-display {
            text-align: center;
            font-size: 72px;
            font-weight: bold;
            margin: 10px 0;
        }
        .status-label {
            text-align: center;
            font-size: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }
        .next-label {
            text-align: center;
            color: #aaa;
            font-size: 16px;
            margin-top: 5px;
        }
        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .btn-group { display: flex; gap: 10px; }
        .btn-secondary { background: #444; }
        input, select {
            width: 100%;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            margin-top: 5px;
            font-size: 16px;
        }
        .exercise-list { margin-top: 10px; }
        .exercise-item {
            background: #2a2a2a;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .remove-btn { color: var(--accent); background: none; border: none; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>Custom HIIT Engine</h1>
    
    <!-- Timer Display -->
    <div class="card" id="timerCard" style="border-top: 8px solid #444;">
        <div class="status-label" id="status">Ready</div>
        <div class="timer-display" id="countdown">00</div>
        <div class="next-label" id="nextUp">Next: --</div>
        <div class="btn-group">
            <button class="btn" id="startBtn" onclick="toggleTimer()">Start</button>
            <button class="btn btn-secondary" onclick="resetTimer()">Reset</button>
        </div>
    </div>

    <!-- Configuration -->
    <div class="card">
        <h3>Settings</h3>
        <label>Work Duration (seconds)
            <input type="number" id="workTime" value="30">
        </label>
        <label style="margin-top: 10px; display: block;">Rest Duration (seconds)
            <input type="number" id="restTime" value="10">
        </label>
    </div>

    <!-- Routine Builder -->
    <div class="card">
        <h3>Your Routine</h3>
        <div class="btn-group">
            <input type="text" id="newExercise" placeholder="e.g., Jumping Jacks">
            <button class="btn" style="width: auto; margin-top:5px;" onclick="addExercise()">Add</button>
        </div>
        <div class="exercise-list" id="exerciseList"></div>
    </div>
</div>

<!-- SILENT BACKGROUND AUDIO PLAYER TO BYPASS IOS SLEEP RESTRICTIONS -->
<audio id="silentAudio" loop src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA=="></audio>

<script>
    let exercises = ["Jumping Jacks", "Wall Sit", "Push-Ups", "Abdominal Crunch"];
    let currentIndex = 0;
    let isWorking = true;
    let timer = null;
    let timeLeft = 0;
    let isPaused = true;
    const silentAudio = document.getElementById('silentAudio');

    function speak(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); 
            let utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.1; 
            window.speechSynthesis.speak(utterance);
        }
    }

    function renderExercises() {
        const list = document.getElementById('exerciseList');
        list.innerHTML = '';
        exercises.forEach((ex, index) => {
            list.innerHTML += `
                <div class="exercise-item">
                    <span>${index + 1}. ${ex}</span>
                    <button class="remove-btn" onclick="removeExercise(${index})">✕</button>
                </div>`;
        });
    }

    function addExercise() {
        const input = document.getElementById('newExercise');
        if (input.value.trim() !== "") {
            exercises.push(input.value.trim());
            input.value = "";
            renderExercises();
        }
    }

    function removeExercise(index) {
        exercises.splice(index, 1);
        renderExercises();
    }

    function toggleTimer() {
        if (exercises.length === 0) return alert("Please add some exercises first!");
        
        if (isPaused && currentIndex === 0 && timeLeft === 0) {
            speak("Starting workout.");
            initSequence();
        }

        if (isPaused) {
            isPaused = false;
            // Play the silent track. This tells iOS to keep the thread alive in background
            silentAudio.play().catch(e => console.log("Audio play failed:", e));
            document.getElementById('startBtn').innerText = "Pause";
            document.getElementById('startBtn').style.backgroundColor = "#ffa502";
            timer = setInterval(tick, 1000);
        } else {
            isPaused = true;
            silentAudio.pause();
            document.getElementById('startBtn').innerText = "Resume";
            document.getElementById('startBtn').style.backgroundColor = "var(--work)";
            clearInterval(timer);
        }
    }

    function initSequence() {
        isWorking = true;
        timeLeft = parseInt(document.getElementById('workTime').value);
        updateUI();
        speak(`First exercise: ${exercises[currentIndex]}. Go!`);
    }

    function tick() {
        if (timeLeft > 0) {
            timeLeft--;
            if (timeLeft <= 3 && timeLeft > 0) {
                speak(timeLeft.toString()); 
            }
            updateUI();
        } else {
            if (isWorking) {
                if (currentIndex < exercises.length - 1) {
                    isWorking = false;
                    timeLeft = parseInt(document.getElementById('restTime').value);
                    let nextEx = exercises[currentIndex + 1];
                    speak(`Rest time. Next up is ${nextEx}.`);
                    updateUI();
                } else {
                    clearInterval(timer);
                    isPaused = true;
                    silentAudio.pause();
                    document.getElementById('status').innerText = "Finished!";
                    document.getElementById('countdown').innerText = "🎉";
                    speak("Workout complete! Great job.");
                    document.getElementById('startBtn').innerText = "Start";
                    return;
                }
            } else {
                currentIndex++;
                isWorking = true;
                timeLeft = parseInt(document.getElementById('workTime').value);
                speak(`Exercise: ${exercises[currentIndex]}. Go!`);
                updateUI();
            }
        }
    }

    function updateUI() {
        const card = document.getElementById('timerCard');
        const status = document.getElementById('status');
        const countdown = document.getElementById('countdown');
        const nextUp = document.getElementById('nextUp');

        countdown.innerText = timeLeft < 10 ? "0" + timeLeft : timeLeft;

        if (isWorking) {
            status.innerText = exercises[currentIndex];
            card.style.borderTopColor = "var(--work)";
            let next = exercises[currentIndex + 1] ? exercises[currentIndex + 1] : "Done!";
            nextUp.innerText = `Next: ${next}`;
        } else {
            status.innerText = "Rest Period";
            card.style.borderTopColor = "var(--rest)";
            nextUp.innerText = `Up Next: ${exercises[currentIndex + 1]}`;
        }
    }

    function resetTimer() {
        clearInterval(timer);
        isPaused = true;
        silentAudio.pause();
        currentIndex = 0;
        timeLeft = 0;
        document.getElementById('startBtn').innerText = "Start";
        document.getElementById('startBtn').style.backgroundColor = "var(--accent)";
        document.getElementById('status').innerText = "Ready";
        document.getElementById('countdown').innerText = "00";
        document.getElementById('nextUp').innerText = "Next: --";
        document.getElementById('timerCard').style.borderTopColor = "#444";
    }

    renderExercises();
</script>
</body>
</html>
