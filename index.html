<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom HIIT Engine</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .timer-display {
            font-size: 5rem;
            font-weight: bold;
            margin: 20px 0;
            font-variant-numeric: tabular-nums;
        }
        .status-display {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #bb86fc;
            margin-bottom: 10px;
        }
        .exercise-name {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 30px;
            min-height: 2.4rem;
        }
        button {
            background-color: #03dac6;
            color: #000000;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s, background-color 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:active {
            transform: scale(0.98);
        }
        button.stop {
            background-color: #cf6679;
            color: #ffffff;
        }
        button.proceed {
            background-color: #bb86fc;
            color: #000000;
            margin-top: 20px;
        }
        .view-section { display: none; }
        .active-view { display: block; }
        
        .alert-card {
            background-color: #1e1e1e;
            border: 2px solid #cf6679;
            border-radius: 12px;
            padding: 30px 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .alert-card h2 {
            color: #cf6679;
            margin-top: 0;
            font-size: 1.6rem;
        }
        .alert-card ul {
            text-align: left;
            padding-left: 20px;
            line-height: 1.6;
            color: #e0e0e0;
        }
        .alert-card li {
            margin-bottom: 10px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #a0a0a0;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            background-color: #1e1e1e;
            border: 1px solid #333333;
            border-radius: 8px;
            color: #ffffff;
            font-size: 1rem;
            box-sizing: border-box;
        }
        textarea { height: 120px; resize: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="reminderView" class="view-section active-view">
        <div class="alert-card">
            <h2>⚠️ iOS Hardware Check</h2>
            <p>To ensure your voice counts don't stop mid-workout, please verify your settings before starting:</p>
            <ul>
                <li><strong>Auto-Lock:</strong> Set to 5 Minutes or Never <br><small>(Settings &gt; Display &amp; Brightness)</small></li>
                <li><strong>Low Power Mode:</strong> Turned OFF <br><small>(Settings &gt; Battery)</small></li>
            </ul>
        </div>
        <button id="proceedBtn" class="proceed">I'm Ready, Proceed</button>
    </div>

    <div id="setupView" class="view-section">
        <div class="input-group">
            <label for="workTime">Work Duration (seconds):</label>
            <input type="number" id="workTime" value="30" min="1">
        </div>
        <div class="input-group">
            <label for="restTime">Rest Duration (seconds):</label>
            <input type="number" id="restTime" value="5" min="1">
        </div>
        <div class="input-group">
            <label for="exerciseList">Exercises (one per line):</label>
            <textarea id="exerciseList">Jumping Jacks
Pushups
Squats
Plank</textarea>
        </div>
        <button id="startBtn">START WORKOUT</button>
    </div>

    <div id="runView" class="view-section">
        <div id="statusLabel" class="status-display">Get Ready</div>
        <div id="exerciseLabel" class="exercise-name">---</div>
        <div id="timerLabel" class="timer-display">00</div>
        <button id="stopBtn" class="stop">STOP</button>
    </div>
</div>

<script>
    let exercises = [];
    let currentIdx = 0;
    let currentPhase = 'warmup';
    let timeLeft = 0;
    let timerInterval = null;
    
    let audioCtx = null;

    const reminderView = document.getElementById('reminderView');
    const setupView = document.getElementById('setupView');
    const runView = document.getElementById('runView');
    
    const workInput = document.getElementById('workTime');
    const restInput = document.getElementById('restTime');
    const listInput = document.getElementById('exerciseList');
    
    const statusLabel = document.getElementById('statusLabel');
    const exerciseLabel = document.getElementById('exerciseLabel');
    const timerLabel = document.getElementById('timerLabel');
    
    const proceedBtn = document.getElementById('proceedBtn');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');

    const synth = window.speechSynthesis;

    // Advanced synth synthesis to simulate an authentic ringing MIDI bell sound
    function playBellTone(frequency, duration) {
        if (!audioCtx) return;
        try {
            const now = audioCtx.currentTime;
            
            // 1. Primary fundamental root note oscillator
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(frequency, now);
            
            // 2. Secondary overtone harmonic oscillator (simulates metal chime resonance)
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(frequency * 2, now); // Double the frequency for perfect higher octave blend
            
            // Master volume envelope control node
            const masterGain = audioCtx.createGain();
            
            // Setup smooth exponential decay curve (The "Ring")
            masterGain.gain.setValueAtTime(0.7, now);
            masterGain.gain.exponentialRampToValueAtTime(0.00001, now + duration);
            
            // Balance the fundamental and the overtone chime
            gain1.gain.setValueAtTime(0.6, now);
            gain2.gain.setValueAtTime(0.3, now); 
            
            // Map the framework connections
            osc1.connect(gain1);
            gain1.connect(masterGain);
            
            osc2.connect(gain2);
            gain2.connect(masterGain);
            
            masterGain.connect(audioCtx.destination);
            
            // Execute audio broadcast sequence
            osc1.start(now);
            osc2.start(now);
            
            osc1.stop(now + duration);
            osc2.stop(now + duration);
        } catch (e) {
            console.log("Audio error:", e);
        }
    }

    function speak(text) {
        if (synth.speaking) synth.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 1.15;
        synth.speak(utterance);
    }

    function updateDisplay() {
        timerLabel.textContent = timeLeft;
        if (currentPhase === 'warmup') {
            statusLabel.textContent = "Get Ready";
            statusLabel.style.color = "#ffb74d";
            exerciseLabel.textContent = "First up: " + exercises[0];
        } else if (currentPhase === 'work') {
            statusLabel.textContent = "Work";
            statusLabel.style.color = "#03dac6";
            exerciseLabel.textContent = exercises[currentIdx];
        } else if (currentPhase === 'rest') {
            statusLabel.textContent = "Rest";
            statusLabel.style.color = "#bb86fc";
            exerciseLabel.textContent = "Up Next: " + (exercises[currentIdx + 1] || "Done!");
        }
    }

    function tick() {
        if (timeLeft <= 0) {
            if (currentPhase === 'warmup') {
                currentPhase = 'work';
                timeLeft = parseInt(workInput.value);
                speak(exercises[currentIdx]);
            } else if (currentPhase === 'work') {
                currentPhase = 'rest';
                timeLeft = parseInt(restInput.value);
                if (currentIdx >= exercises.length - 1) {
                    endWorkout();
                    return;
                }
            } else if (currentPhase === 'rest') {
                currentIdx++;
                currentPhase = 'work';
                timeLeft = parseInt(workInput.value);
                speak(exercises[currentIdx]);
            }
        } else {
            // Elongated durations and dual-frequency notes for rich ring-out execution
            if (timeLeft === 4) playBellTone(261.63, 0.45); // Elongated C4 Bell
            if (timeLeft === 3) playBellTone(261.63, 0.45); // Elongated C4 Bell
            if (timeLeft === 2) playBellTone(261.63, 0.45); // Elongated C4 Bell
            if (timeLeft === 1) playBellTone(523.25, 0.85); // High Ringing C5 Target Bell
            
            timeLeft--;
        }
        updateDisplay();
    }

    function proceedToSetup() {
        reminderView.classList.remove('active-view');
        setupView.classList.add('active-view');
    }

    function startWorkout() {
        exercises = listInput.value.split('\n').map(e => e.trim()).filter(e => e.length > 0);
        if (exercises.length === 0) return alert("Please enter at least one exercise.");

        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        currentIdx = 0;
        currentPhase = 'warmup';
        timeLeft = 10;

        setupView.classList.remove('active-view');
        runView.classList.add('active-view');

        speak("Get ready.");
        updateDisplay();
        
        timerInterval = setInterval(tick, 1000);
    }

    function endWorkout() {
        clearInterval(timerInterval);
        speak("Workout complete.");
        setupView.classList.add('active-view');
        runView.classList.remove('active-view');
    }

    function stopWorkout() {
        clearInterval(timerInterval);
        if (synth.speaking) synth.cancel();
        setupView.classList.add('active-view');
        runView.classList.remove('active-view');
    }

    proceedBtn.addEventListener('click', proceedToSetup);
    startBtn.addEventListener('click', startWorkout);
    stopBtn.addEventListener('click', stopWorkout);
</script>

</body>
</html>
